version: '3.8'

services:
  vpn-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: vpn-server:latest
    container_name: vpn-server
    ports:
      - "${VPN_PORT:-4080}:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:80
    restart: unless-stopped
    networks:
      - vpn-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vpn-network:
    driver: bridge