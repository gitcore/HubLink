version: '3.8'

services:
  vpn-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn-server
    ports:
      - "4080:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
    restart: unless-stopped
    networks:
      - vpn-network

networks:
  vpn-network:
    driver: bridge